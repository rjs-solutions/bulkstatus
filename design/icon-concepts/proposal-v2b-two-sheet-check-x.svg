<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="t d">
  <title id="t">BulkStatus v2b</title>
  <desc id="d">Two stacked pages with a green check badge and a red x badge.</desc>
  <defs>
    <linearGradient id="f2b" x1="20" y1="16" x2="96" y2="106" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#e9eef4"/>
    </linearGradient>
    <linearGradient id="g2b" x1="70" y1="78" x2="112" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#34d36b"/><stop offset="1" stop-color="#15a349"/>
    </linearGradient>
    <linearGradient id="r2b" x1="78" y1="6" x2="118" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fb7185"/><stop offset="1" stop-color="#dc2626"/>
    </linearGradient>
  </defs>
  <!-- back sheet -->
  <rect x="28" y="20" width="70" height="92" rx="13" fill="#46566b"/>
  <!-- front sheet -->
  <rect x="18" y="30" width="70" height="92" rx="13" fill="url(#f2b)" stroke="#c4cfdb" stroke-width="2"/>
  <!-- content rows -->
  <rect x="30" y="52" width="44" height="9" rx="4.5" fill="#2b3647"/>
  <rect x="30" y="71" width="44" height="9" rx="4.5" fill="#2b3647"/>
  <rect x="30" y="90" width="30" height="9" rx="4.5" fill="#2b3647"/>
  <!-- red x badge (top-right) -->
  <circle cx="99" cy="29" r="20" fill="#0b1220" opacity=".16"/>
  <circle cx="99" cy="29" r="18.5" fill="url(#r2b)" stroke="#b21d1d" stroke-width="2"/>
  <path d="M92 22 l14 14 M106 22 l-14 14" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
  <!-- green check badge (bottom-right, dominant) -->
  <circle cx="98" cy="98" r="25" fill="#0b1220" opacity=".18"/>
  <circle cx="98" cy="98" r="23" fill="url(#g2b)" stroke="#0e7a38" stroke-width="2"/>
  <path d="M86 98.5 l8.5 8.5 L111 89" fill="none" stroke="#fff" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"/>
