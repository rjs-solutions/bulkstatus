<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">BulkStatus icon concept C</title>
  <desc id="desc">A simplified stacked checklist optimized for small Chrome toolbar sizes.</desc>
  <defs>
    <filter id="shadow-c" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#0f172a" flood-opacity=".24"/>
    </filter>
    <linearGradient id="paper-c" x1="28" y1="22" x2="96" y2="105" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef4fa"/>
    </linearGradient>
  </defs>

  <g filter="url(#shadow-c)">
    <rect x="26" y="19" width="74" height="82" rx="16" fill="#8ca0b5" transform="rotate(-7 64 64)"/>
    <rect x="20" y="25" width="88" height="82" rx="17" fill="url(#paper-c)" stroke="#c6d2df" stroke-width="2"/>
  </g>

  <rect x="33" y="42" width="15" height="15" rx="7.5" fill="#22c55e"/>
  <rect x="56" y="43" width="40" height="12" rx="6" fill="#1e293b"/>
  <rect x="33" y="61" width="15" height="15" rx="7.5" fill="#f59e0b"/>
  <rect x="56" y="63" width="40" height="12" rx="6" fill="#1e293b"/>
  <rect x="33" y="80" width="15" height="15" rx="7.5" fill="#ef4444"/>
  <rect x="56" y="82" width="40" height="12" rx="6" fill="#1e293b"/>
</svg>
