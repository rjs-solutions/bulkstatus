<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">BulkStatus icon concept B</title>
  <desc id="desc">Layered sheets with a compact status dashboard strip.</desc>
  <defs>
    <filter id="shadow-b" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="7" stdDeviation="6" flood-color="#0f172a" flood-opacity=".25"/>
    </filter>
    <linearGradient id="layer-dark-b" x1="36" y1="14" x2="96" y2="78" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#627487"/>
      <stop offset="1" stop-color="#273445"/>
    </linearGradient>
    <linearGradient id="layer-light-b" x1="32" y1="33" x2="98" y2="91" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dce5ee"/>
    </linearGradient>
  </defs>

  <g filter="url(#shadow-b)">
    <path d="M23 36 64 15l42 21-42 21-41-21Z" fill="url(#layer-dark-b)" stroke="#162235" stroke-width="1.5"/>
    <path d="M22 57 64 36l43 21-43 22-42-22Z" fill="url(#layer-light-b)" stroke="#c5d1de" stroke-width="1.5"/>
    <path d="M22 78 64 56l43 22-43 22-42-22Z" fill="#cbd7e2" stroke="#aebdca" stroke-width="1.5"/>
  </g>

  <g transform="translate(43 71)">
    <rect x="0" y="0" width="61" height="29" rx="10" fill="#f8fafc" stroke="#c8d3df" stroke-width="1.5"/>
    <circle cx="14" cy="14.5" r="6.5" fill="#22c55e"/>
    <circle cx="30.5" cy="14.5" r="6.5" fill="#f59e0b"/>
    <circle cx="47" cy="14.5" r="6.5" fill="#ef4444"/>
  </g>
</svg>
