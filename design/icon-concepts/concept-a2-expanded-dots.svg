<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">BulkStatus icon concept A2</title>
  <desc id="desc">A larger fanned stack with spaced green, amber, and red status dots.</desc>
  <defs>
    <filter id="shadow-a2" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="7" stdDeviation="6" flood-color="#0f172a" flood-opacity=".28"/>
    </filter>
    <linearGradient id="front-a2" x1="12" y1="17" x2="116" y2="116" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef3f8"/>
    </linearGradient>
    <linearGradient id="back-a2" x1="16" y1="13" x2="103" y2="103" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6d7f91"/>
      <stop offset="1" stop-color="#263447"/>
    </linearGradient>
    <linearGradient id="bar-a2" x1="48" y1="0" x2="108" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#273244"/>
      <stop offset="1" stop-color="#172131"/>
    </linearGradient>
  </defs>

  <g filter="url(#shadow-a2)">
    <rect x="21" y="9" width="90" height="92" rx="17" fill="url(#back-a2)" stroke="#142035" stroke-width="1.4"/>
    <rect x="15" y="15" width="98" height="94" rx="18" fill="#c7d4e0" stroke="#8fa1b3" stroke-width="1.25"/>
    <rect x="8" y="23" width="112" height="93" rx="19" fill="url(#front-a2)" stroke="#c8d3df" stroke-width="1.6"/>
  </g>

  <g>
    <circle cx="36" cy="49" r="10" fill="#22c55e" stroke="#12833d" stroke-width="1.4"/>
    <rect x="55" y="42" width="51" height="13" rx="6.5" fill="url(#bar-a2)"/>
    <circle cx="36" cy="72" r="10" fill="#f59e0b" stroke="#bd6f07" stroke-width="1.4"/>
    <rect x="55" y="65" width="51" height="13" rx="6.5" fill="url(#bar-a2)"/>
    <circle cx="36" cy="95" r="10" fill="#ef4444" stroke="#b91c1c" stroke-width="1.4"/>
    <rect x="55" y="88" width="51" height="13" rx="6.5" fill="url(#bar-a2)"/>
  </g>
</svg>
