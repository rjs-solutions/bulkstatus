<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="t d">
  <title id="t">BulkStatus v2a</title>
  <desc id="d">Two stacked pages with a single green check badge.</desc>
  <defs>
    <linearGradient id="f2a" x1="22" y1="18" x2="100" y2="108" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#e9eef4"/>
    </linearGradient>
    <linearGradient id="g2a" x1="74" y1="74" x2="116" y2="116" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#34d36b"/><stop offset="1" stop-color="#15a349"/>
    </linearGradient>
  </defs>
  <!-- one back sheet (2 panels total) -->
  <rect x="30" y="18" width="74" height="94" rx="13" fill="#46566b"/>
  <!-- front sheet -->
  <rect x="20" y="28" width="74" height="94" rx="13" fill="url(#f2a)" stroke="#c4cfdb" stroke-width="2"/>
  <!-- bold content rows -->
  <rect x="33" y="47" width="48" height="9" rx="4.5" fill="#2b3647"/>
  <rect x="33" y="66" width="48" height="9" rx="4.5" fill="#2b3647"/>
  <rect x="33" y="85" width="32" height="9" rx="4.5" fill="#2b3647"/>
  <!-- single status badge -->
  <circle cx="96" cy="96" r="25" fill="#0b1220" opacity=".18"/>
  <circle cx="96" cy="96" r="23" fill="url(#g2a)" stroke="#0e7a38" stroke-width="2"/>
  <path d="M84 96.5 l8.5 8.5 L109 87" fill="none" stroke="#fff" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
