<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="t d">
  <title id="t">BulkStatus proposed icon</title>
  <desc id="d">A stack of pages with a single bold green check badge.</desc>
  <defs>
    <linearGradient id="pFront" x1="20" y1="14" x2="108" y2="104" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e9eef4"/>
    </linearGradient>
    <linearGradient id="pCheck" x1="74" y1="74" x2="116" y2="116" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#34d36b"/>
      <stop offset="1" stop-color="#15a349"/>
    </linearGradient>
  </defs>

  <!-- back sheets: dark, simple cascade for a recognizable "bulk" silhouette -->
  <rect x="34" y="14" width="74" height="92" rx="13" fill="#2b3647"/>
  <rect x="26" y="22" width="74" height="92" rx="13" fill="#46566b"/>
  <!-- front sheet -->
  <rect x="18" y="30" width="74" height="92" rx="13" fill="url(#pFront)" stroke="#c4cfdb" stroke-width="2"/>

  <!-- three bold content rows (high-contrast, no tiny color dots) -->
  <rect x="30" y="48" width="50" height="9" rx="4.5" fill="#2b3647"/>
  <rect x="30" y="66" width="50" height="9" rx="4.5" fill="#2b3647"/>
  <rect x="30" y="84" width="34" height="9" rx="4.5" fill="#2b3647"/>

  <!-- single strong status badge -->
  <circle cx="95" cy="95" r="25" fill="#0b1220" opacity=".18"/>
  <circle cx="95" cy="95" r="23" fill="url(#pCheck)" stroke="#0e7a38" stroke-width="2"/>
  <path d="M83 95.5 l8.5 8.5 L108 86" fill="none" stroke="#ffffff" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
