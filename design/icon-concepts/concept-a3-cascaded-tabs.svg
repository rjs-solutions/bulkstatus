<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">BulkStatus icon concept A3</title>
  <desc id="desc">Cascaded tab outlines behind a white status checklist page.</desc>
  <defs>
    <filter id="shadow-a3" x="-18%" y="-18%" width="140%" height="150%">
      <feDropShadow dx="0" dy="7" stdDeviation="6" flood-color="#0f172a" flood-opacity=".28"/>
    </filter>
    <linearGradient id="front-a3" x1="23" y1="28" x2="113" y2="118" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef3f8"/>
    </linearGradient>
    <linearGradient id="back-frame-a3" x1="22" y1="10" x2="96" y2="86" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#617486"/>
      <stop offset="1" stop-color="#172333"/>
    </linearGradient>
    <linearGradient id="mid-frame-a3" x1="16" y1="18" x2="104" y2="98" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d7e1eb"/>
      <stop offset="1" stop-color="#415369"/>
    </linearGradient>
    <linearGradient id="bar-a3" x1="53" y1="0" x2="107" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#273244"/>
      <stop offset="1" stop-color="#172131"/>
    </linearGradient>
    <linearGradient id="gloss-green-a3" x1="24" y1="42" x2="46" y2="62" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#bbf7d0" stop-opacity=".95"/>
      <stop offset=".55" stop-color="#22c55e" stop-opacity=".55"/>
      <stop offset="1" stop-color="#16a34a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gloss-amber-a3" x1="24" y1="64" x2="46" y2="84" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fde68a" stop-opacity=".95"/>
      <stop offset=".55" stop-color="#f59e0b" stop-opacity=".55"/>
      <stop offset="1" stop-color="#d97706" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gloss-red-a3" x1="24" y1="86" x2="46" y2="106" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fecaca" stop-opacity=".95"/>
      <stop offset=".55" stop-color="#ef4444" stop-opacity=".55"/>
      <stop offset="1" stop-color="#dc2626" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <g filter="url(#shadow-a3)">
    <rect x="23" y="9" width="86" height="88" rx="18" fill="url(#back-frame-a3)" stroke="#101827" stroke-width="1.5"/>
    <rect x="31" y="17" width="70" height="72" rx="13" fill="#101827" opacity=".28"/>

    <rect x="16" y="17" width="96" height="91" rx="19" fill="url(#mid-frame-a3)" stroke="#718499" stroke-width="1.35"/>
    <rect x="25" y="26" width="78" height="73" rx="13" fill="#102033" opacity=".25"/>

    <rect x="8" y="27" width="112" height="90" rx="20" fill="url(#front-a3)" stroke="#c8d3df" stroke-width="1.7"/>
  </g>

  <g>
    <circle cx="35" cy="53" r="10" fill="#22c55e" stroke="#12833d" stroke-width="1.4"/>
    <path d="m30.5 53.2 3.1 3.3 6.4-7" fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"/>
    <path d="M27 49c2.4-5.2 13.1-6.1 16.5-.3-5.7-1.6-10.6-.9-16.5.3Z" fill="url(#gloss-green-a3)"/>
    <rect x="54" y="46.5" width="53" height="13" rx="6.5" fill="url(#bar-a3)"/>

    <circle cx="35" cy="75" r="10" fill="#f59e0b" stroke="#bd6f07" stroke-width="1.4"/>
    <path d="M35 69.4v7.3" fill="none" stroke="#ffffff" stroke-linecap="round" stroke-width="3"/>
    <circle cx="35" cy="80.7" r="1.6" fill="#ffffff"/>
    <path d="M27 71c2.4-5.2 13.1-6.1 16.5-.3-5.7-1.6-10.6-.9-16.5.3Z" fill="url(#gloss-amber-a3)"/>
    <rect x="54" y="68.5" width="53" height="13" rx="6.5" fill="url(#bar-a3)"/>

    <circle cx="35" cy="97" r="10" fill="#ef4444" stroke="#b91c1c" stroke-width="1.4"/>
    <path d="m31.2 93.2 7.6 7.6M38.8 93.2l-7.6 7.6" fill="none" stroke="#ffffff" stroke-linecap="round" stroke-width="3"/>
    <path d="M27 93c2.4-5.2 13.1-6.1 16.5-.3-5.7-1.6-10.6-.9-16.5.3Z" fill="url(#gloss-red-a3)"/>
    <rect x="54" y="90.5" width="53" height="13" rx="6.5" fill="url(#bar-a3)"/>
