<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">BulkStatus icon concept A4</title>
  <desc id="desc">Cascaded prior tabs visible along the top and right side behind a white status checklist page.</desc>
  <defs>
    <filter id="shadow-a4" x="-18%" y="-18%" width="142%" height="150%">
      <feDropShadow dx="0" dy="7" stdDeviation="6" flood-color="#0f172a" flood-opacity=".28"/>
    </filter>
    <linearGradient id="front-a4" x1="15" y1="27" x2="112" y2="118" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef3f8"/>
    </linearGradient>
    <linearGradient id="back-a4" x1="27" y1="8" x2="124" y2="99" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#617486"/>
      <stop offset="1" stop-color="#172333"/>
    </linearGradient>
    <linearGradient id="mid-a4" x1="20" y1="16" x2="120" y2="109" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d7e1eb"/>
      <stop offset="1" stop-color="#415369"/>
    </linearGradient>
    <linearGradient id="bar-a4" x1="53" y1="0" x2="107" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#273244"/>
      <stop offset="1" stop-color="#172131"/>
    </linearGradient>
    <linearGradient id="gloss-green-a4" x1="24" y1="43" x2="46" y2="63" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#bbf7d0" stop-opacity=".95"/>
      <stop offset=".55" stop-color="#22c55e" stop-opacity=".55"/>
      <stop offset="1" stop-color="#16a34a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gloss-amber-a4" x1="24" y1="65" x2="46" y2="85" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fde68a" stop-opacity=".95"/>
      <stop offset=".55" stop-color="#f59e0b" stop-opacity=".55"/>
      <stop offset="1" stop-color="#d97706" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gloss-red-a4" x1="24" y1="87" x2="46" y2="107" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fecaca" stop-opacity=".95"/>
      <stop offset=".55" stop-color="#ef4444" stop-opacity=".55"/>
      <stop offset="1" stop-color="#dc2626" stop-opacity="0"/>
