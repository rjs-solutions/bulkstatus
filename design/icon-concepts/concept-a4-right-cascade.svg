  <g>
    <circle cx="34" cy="54" r="10" fill="#22c55e" stroke="#12833d" stroke-width="1.4"/>
    <path d="m29.5 54.2 3.1 3.3 6.4-7" fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"/>
    <path d="M26 50c2.4-5.2 13.1-6.1 16.5-.3-5.7-1.6-10.6-.9-16.5.3Z" fill="url(#gloss-green-a4)"/>
