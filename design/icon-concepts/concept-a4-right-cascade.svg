  <g filter="url(#shadow-a4)">
    <rect x="27" y="8" width="92" height="91" rx="18" fill="url(#back-a4)" stroke="#101827" stroke-width="1.5"/>
    <rect x="36" y="17" width="74" height="73" rx="13" fill="#101827" opacity=".26"/>

    <rect x="18" y="17" width="100" height="94" rx="19" fill="url(#mid-a4)" stroke="#718499" stroke-width="1.35"/>
    <rect x="27" y="26" width="82" height="76" rx="14" fill="#102033" opacity=".2"/>

    <rect x="7" y="28" width="108" height="89" rx="20" fill="url(#front-a4)" stroke="#c8d3df" stroke-width="1.7"/>
