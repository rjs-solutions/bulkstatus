    <circle cx="34" cy="76" r="10" fill="#f59e0b" stroke="#bd6f07" stroke-width="1.4"/>
    <path d="M34 70.4v7.3" fill="none" stroke="#ffffff" stroke-linecap="round" stroke-width="3"/>
    <circle cx="34" cy="81.7" r="1.6" fill="#ffffff"/>
    <path d="M26 72c2.4-5.2 13.1-6.1 16.5-.3-5.7-1.6-10.6-.9-16.5.3Z" fill="url(#gloss-amber-a4)"/>
    <rect x="53" y="69.5" width="52" height="13" rx="6.5" fill="url(#bar-a4)"/>

    <circle cx="34" cy="98" r="10" fill="#ef4444" stroke="#b91c1c" stroke-width="1.4"/>
    <path d="m30.2 94.2 7.6 7.6M37.8 94.2l-7.6 7.6" fill="none" stroke="#ffffff" stroke-linecap="round" stroke-width="3"/>
    <path d="M26 94c2.4-5.2 13.1-6.1 16.5-.3-5.7-1.6-10.6-.9-16.5.3Z" fill="url(#gloss-red-a4)"/>
