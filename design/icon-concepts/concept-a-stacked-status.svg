<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">BulkStatus icon concept A</title>
  <desc id="desc">A stacked page icon with green, amber, and red URL status rows.</desc>
  <defs>
    <filter id="shadow-a" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="7" stdDeviation="6" flood-color="#0f172a" flood-opacity=".28"/>
    </filter>
    <linearGradient id="top-a" x1="12" y1="17" x2="116" y2="116" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef3f8"/>
    </linearGradient>
    <linearGradient id="back-a" x1="16" y1="13" x2="103" y2="103" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6d7f91"/>
      <stop offset="1" stop-color="#263447"/>
    </linearGradient>
    <linearGradient id="mid-a" x1="25" y1="18" x2="111" y2="108" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#d9e3ed"/>
    </linearGradient>
    <linearGradient id="bar-a" x1="48" y1="0" x2="108" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#273244"/>
      <stop offset="1" stop-color="#172131"/>
    </linearGradient>
    <linearGradient id="gloss-green-a" x1="26" y1="39" x2="48" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#bbf7d0" stop-opacity=".95"/>
      <stop offset=".55" stop-color="#22c55e" stop-opacity=".55"/>
      <stop offset="1" stop-color="#16a34a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gloss-amber-a" x1="26" y1="62" x2="48" y2="83" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fde68a" stop-opacity=".95"/>
      <stop offset=".55" stop-color="#f59e0b" stop-opacity=".55"/>
      <stop offset="1" stop-color="#d97706" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gloss-red-a" x1="26" y1="85" x2="48" y2="106" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fecaca" stop-opacity=".95"/>
      <stop offset=".55" stop-color="#ef4444" stop-opacity=".55"/>
      <stop offset="1" stop-color="#dc2626" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <g filter="url(#shadow-a)">
    <rect x="21" y="9" width="90" height="92" rx="17" fill="url(#back-a)" stroke="#142035" stroke-width="1.4"/>
    <rect x="15" y="15" width="98" height="94" rx="18" fill="#c7d4e0" stroke="#8fa1b3" stroke-width="1.25"/>
    <rect x="8" y="23" width="112" height="93" rx="19" fill="url(#top-a)" stroke="#c8d3df" stroke-width="1.6"/>
  </g>

  <g>
    <circle cx="36" cy="49" r="10" fill="#22c55e" stroke="#12833d" stroke-width="1.4"/>
    <path d="m31.5 49.2 3.1 3.3 6.4-7" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M28 45c2.4-5.2 13.1-6.1 16.5-.3-5.7-1.6-10.6-.9-16.5.3Z" fill="url(#gloss-green-a)"/>
    <rect x="55" y="42" width="51" height="13" rx="6.5" fill="url(#bar-a)"/>

    <circle cx="36" cy="72" r="10" fill="#f59e0b" stroke="#bd6f07" stroke-width="1.4"/>
    <path d="M36 66.4v7.3" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <circle cx="36" cy="77.7" r="1.6" fill="#ffffff"/>
    <path d="M28 68c2.4-5.2 13.1-6.1 16.5-.3-5.7-1.6-10.6-.9-16.5.3Z" fill="url(#gloss-amber-a)"/>
    <rect x="55" y="65" width="51" height="13" rx="6.5" fill="url(#bar-a)"/>

    <circle cx="36" cy="95" r="10" fill="#ef4444" stroke="#b91c1c" stroke-width="1.4"/>
    <path d="m32.2 91.2 7.6 7.6M39.8 91.2l-7.6 7.6" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <path d="M28 91c2.4-5.2 13.1-6.1 16.5-.3-5.7-1.6-10.6-.9-16.5.3Z" fill="url(#gloss-red-a)"/>
    <rect x="55" y="88" width="51" height="13" rx="6.5" fill="url(#bar-a)"/>
  </g>
</svg>
