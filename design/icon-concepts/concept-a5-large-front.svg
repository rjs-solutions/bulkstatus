<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">BulkStatus icon concept A5</title>
  <desc id="desc">Large foreground status checklist page with subtle prior tabs visible at the top and right side.</desc>
  <defs>
    <filter id="shadow-a5" x="-18%" y="-18%" width="142%" height="150%">
      <feDropShadow dx="0" dy="7" stdDeviation="6" flood-color="#0f172a" flood-opacity=".28"/>
    </filter>
    <linearGradient id="front-a5" x1="14" y1="20" x2="114" y2="118" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef3f8"/>
    </linearGradient>
    <linearGradient id="back-a5" x1="22" y1="8" x2="122" y2="111" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#617486"/>
      <stop offset="1" stop-color="#172333"/>
    </linearGradient>
    <linearGradient id="mid-a5" x1="16" y1="13" x2="120" y2="116" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d7e1eb"/>
