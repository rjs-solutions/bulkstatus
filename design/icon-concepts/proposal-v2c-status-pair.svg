<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="t d">
  <title id="t">BulkStatus v2c</title>
  <desc id="d">Two stacked pages whose rows are a green check and a red x.</desc>
  <defs>
    <linearGradient id="f2c" x1="22" y1="16" x2="102" y2="110" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#e9eef4"/>
    </linearGradient>
  </defs>
  <!-- back sheet -->
  <rect x="32" y="16" width="72" height="96" rx="13" fill="#46566b"/>
  <!-- front sheet -->
  <rect x="20" y="26" width="76" height="96" rx="14" fill="url(#f2c)" stroke="#c4cfdb" stroke-width="2"/>

  <!-- row 1: green check + bar -->
  <circle cx="40" cy="56" r="13" fill="#1faa53"/>
  <path d="M33 56.5 l5 5 L48 50" fill="none" stroke="#fff" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="58" y="51" width="30" height="10" rx="5" fill="#2b3647"/>

  <!-- row 2: red x + bar -->
  <circle cx="40" cy="92" r="13" fill="#dc2626"/>
  <path d="M35 87 l10 10 M45 87 l-10 10" fill="none" stroke="#fff" stroke-width="4.2" stroke-linecap="round"/>
  <rect x="58" y="87" width="30" height="10" rx="5" fill="#2b3647"/>
</svg>
