<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="t d">
  <title id="t">BulkStatus v2c2 (bold line items)</title>
  <desc id="d">Two stacked pages with bold green-check and red-x status rows tuned for small sizes.</desc>
  <defs>
    <linearGradient id="f2c2" x1="22" y1="14" x2="104" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#e9eef4"/>
    </linearGradient>
  </defs>
  <!-- back sheet (kept subtle so the front rows dominate at small sizes) -->
  <rect x="36" y="14" width="70" height="98" rx="13" fill="#46566b"/>
  <!-- front sheet, larger -->
  <rect x="18" y="24" width="80" height="98" rx="14" fill="url(#f2c2)" stroke="#c4cfdb" stroke-width="2.5"/>

  <!-- row 1: bold green check + short bar -->
  <circle cx="42" cy="54" r="16" fill="#1faa53"/>
  <path d="M33.5 54.5 l6 6 L52 47" fill="none" stroke="#fff" stroke-width="5.2" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="63" y="49" width="26" height="11" rx="5.5" fill="#2b3647"/>

  <!-- row 2: bold red x + short bar -->
  <circle cx="42" cy="92" r="16" fill="#e02424"/>
  <path d="M36 86 l12 12 M48 86 l-12 12" fill="none" stroke="#fff" stroke-width="5.2" stroke-linecap="round"/>
  <rect x="63" y="87" width="26" height="11" rx="5.5" fill="#2b3647"/>
</svg>
